name: One-time terminology fix

on:
  push:
    paths:
      - '.github/workflows/terminology-fix.yml'

permissions:
  contents: write

jobs:
  fix-terminology:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Standardize holonomic terminology
        run: |
          python3 - <<'PY'
          from pathlib import Path

          files = [
              Path('Chuong/2_Co_so_ly_thuyet.tex'),
              Path('Chuong/3_De_xuat.tex'),
              Path('Chuong/4_Phan_tich_ly_thuyet.tex'),
              Path('Chuong/5_Thuc_nghiem.tex'),
          ]

          replacements = [
              ('Metric H và vai trò của mô hình đối chứng', 'Mô hình toàn hướng lý tưởng và vai trò đối chứng'),
              ('Ảnh hưởng của chi phí quay và Metric H', 'Ảnh hưởng của chi phí quay khi đối chiếu với mô hình toàn hướng'),
              ('vai trò của Metric H như một mô hình đối chứng', 'vai trò của mô hình toàn hướng lý tưởng như một mô hình đối chứng'),
              ('vai trò đối chứng của Metric H', 'vai trò đối chứng của mô hình toàn hướng lý tưởng'),
              ('vai trò của Metric H', 'vai trò của mô hình toàn hướng lý tưởng'),
              ('Tùy chọn Metric H', 'Tùy chọn mô hình toàn hướng'),
              ('Đối với Metric H', 'Đối với mô hình toàn hướng'),
              ('Trong Metric H', 'Trong mô hình toàn hướng'),
              ('Cấu hình Metric H', 'Cấu hình toàn hướng'),
              ('cấu hình Metric H', 'cấu hình toàn hướng'),
              ('H01 Metric H', 'H01 toàn hướng'),
              ('theo Metric H', 'theo mô hình toàn hướng'),
              ('so sánh với Metric H', 'so sánh với mô hình toàn hướng'),
              ('với Metric H', 'với mô hình toàn hướng'),
              ('từ Metric H', 'từ mô hình toàn hướng'),
              ('đến từ Metric H', 'đến từ mô hình toàn hướng'),
              ('Metric H được sử dụng', 'Mô hình toàn hướng lý tưởng được sử dụng'),
              ('Metric H được dùng', 'Mô hình toàn hướng lý tưởng được dùng'),
              ('Metric H đóng vai trò', 'mô hình toàn hướng lý tưởng đóng vai trò'),
              ('Metric H xem', 'mô hình toàn hướng lý tưởng xem'),
              ('Metric H giảm', 'cấu hình toàn hướng giảm'),
              ('Metric H làm thay đổi', 'mô hình toàn hướng làm thay đổi'),
              ('Metric H chỉ cần', 'cấu hình toàn hướng chỉ cần'),
              ('Metric H không chỉ', 'mô hình toàn hướng không chỉ'),
              ('Metric H phù hợp', 'mô hình toàn hướng lý tưởng phù hợp'),
              ('vai trò chính của Metric H', 'vai trò chính của mô hình toàn hướng lý tưởng'),
              ('Metric H không được xây dựng', 'Mô hình toàn hướng lý tưởng không được xây dựng'),
              ('Tổng năng lượng của một đường đi có hướng trong Metric H', 'Tổng năng lượng của một đường đi trong mô hình toàn hướng'),
              ('chi phí quay là không đáng kể', 'chi phí quay được bỏ qua ở mức lập kế hoạch'),
              ('chi phí quay được xem là không đáng kể', 'chi phí quay không chi phối quyết định lập kế hoạch'),
              ('xem chi phí quay là không đáng kể', 'bỏ qua chi phí quay ở mức lập kế hoạch'),
              ('khi chi phí quay được xem là không đáng kể', 'khi chi phí quay được bỏ qua ở mức lập kế hoạch'),
              ('nhỏ hoặc không đáng kể', 'không chi phối quyết định lập kế hoạch'),
              ('nhỏ không đáng kể', 'không chi phối quyết định lập kế hoạch'),
              ('Metric H', 'mô hình toàn hướng lý tưởng'),
              ('metric H', 'mô hình toàn hướng lý tưởng'),
              ('H metric', 'mô hình toàn hướng lý tưởng'),
              ('đảm bảo', 'bảo đảm'),
              ('Đảm bảo', 'Bảo đảm'),
          ]

          changed = []
          for path in files:
              text = path.read_text(encoding='utf-8')
              old = text
              for src, dst in replacements:
                  text = text.replace(src, dst)
              if text != old:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Changed files:')
          for item in changed:
              print('-', item)
          PY

      - name: Verify terminology cleanup
        run: |
          if grep -RIn "Metric H\|metric H\|H metric\|chi phí quay là không đáng kể\|nhỏ hoặc không đáng kể\|nhỏ không đáng kể" Chuong/*.tex; then
            echo "Forbidden terminology remains. Refusing to commit."
            exit 1
          fi

      - name: Commit terminology cleanup and remove workflow
        run: |
          rm -f .github/workflows/terminology-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Chuong/2_Co_so_ly_thuyet.tex Chuong/3_De_xuat.tex Chuong/4_Phan_tich_ly_thuyet.tex Chuong/5_Thuc_nghiem.tex .github/workflows/terminology-fix.yml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "standardize remaining holonomic terminology"
          git push
